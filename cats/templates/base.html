{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Vedenika{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <a class="navbar-brand d-flex align-items-center" href="/">
        <img src="{% static 'img/Vedenika-Logo2.png' %}"
             alt="Logo"
             style="height:40px; margin-right:10px;">
        Vedenika
    </a>

    <div class="ms-auto">
        <a class="btn btn-outline-light btn-sm" href="/cats/">Cats</a>
        <a class="btn btn-outline-light btn-sm" href="/media/">Media</a>
    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
