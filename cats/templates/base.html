{% load static %}
{% load i18n %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Vedenika{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/base.css' %}" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-light py-0">
    <div class="container">

        <!-- ЛОГО -->
        <a class="navbar-brand" href="/">
            <img src="{% static 'img/Vedenika-Logo2.png' %}" height="40">
        </a>

        <!-- КНОПКА (mobile) -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- МЕНЮ -->
        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">{% trans "Главная" %}</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/cats/">{% trans "Коты" %}</a>
                </li>
            </ul>

            <!-- 🌍 ПЕРЕКЛЮЧАТЕЛЬ ЯЗЫКА -->
            <div class="d-flex align-items-center">

                {% get_current_language as LANGUAGE_CODE %}

                <form action="{% url 'set_language' %}" method="post" class="d-flex gap-2">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ request.get_full_path }}">

                    <button type="submit" name="language" value="ru" class="btn p-0 border-0">
                        <img src="{% static 'img/ru.png' %}" width="32"
                             {% if LANGUAGE_CODE == 'ru' %}style="opacity:1"{% else %}style="opacity:0.5"{% endif %}>
                    </button>

                    <button type="submit" name="language" value="de" class="btn p-0 border-0">
                        <img src="{% static 'img/de.png' %}" width="32"
                             {% if LANGUAGE_CODE == 'de' %}style="opacity:1"{% else %}style="opacity:0.5"{% endif %}>
                    </button>

                    <button type="submit" name="language" value="en" class="btn p-0 border-0">
                        <img src="{% static 'img/en.png' %}" width="32"
                             {% if LANGUAGE_CODE == 'en' %}style="opacity:1"{% else %}style="opacity:0.5"{% endif %}>
                    </button>

                </form>

            </div>

        </div>
    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
