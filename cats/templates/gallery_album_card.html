{% load i18n %}
{% load cats_extras %}

<a href="{% url 'gallery_album' album.pk %}" class="peek-card">
  {% with cover=album.get_cover %}
    {% if cover %}
      <img src="{{ cover.url }}" alt="{{ album|trans_title }}">
    {% else %}
      <div class="peek-card__empty">📷</div>
    {% endif %}
  {% endwith %}

  <span class="peek-card__title">
    {{ album|trans_title }}
    {% if album.photos_count %} · {{ album.photos_count }}{% endif %}
  </span>
</a>
