{% load i18n %}
{% load socialaccount %}

{% get_providers as socialaccount_providers %}

{% for provider in socialaccount_providers %}
  {% if provider.id == "google" %}
  <a href="{% provider_login_url provider.id %}"
     class="btn-google-login"
     style="
       display: flex;
       align-items: center;
       justify-content: center;
       gap: 10px;
       width: 100%;
       padding: 10px 16px;
       border: 1px solid #dadce0;
       border-radius: 8px;
       background: #fff;
       color: #3c4043;
       font-size: 14px;
       font-weight: 500;
       text-decoration: none;
       cursor: pointer;
       transition: background .15s, box-shadow .15s;
       font-family: inherit;
     "
     onmouseover="this.style.background='#f8f9fa'; this.style.boxShadow='0 1px 3px rgba(0,0,0,0.12)';"
     onmouseout="this.style.background='#fff'; this.style.boxShadow='none';">
    <svg width="18" height="18" viewBox="0 0 48 48">
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.34-8.16 2.34-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      <path fill="#FBBC05" d="M10.53 28.62A14.9 14.9 0 019.6 24c0-1.6.27-3.15.93-4.62l-7.98-6.19A23.93 23.93 0 000 24c0 3.77.9 7.34 2.55 10.81l7.98-6.19z"/>
      <path fill="#EA4335" d="M24 9.52c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.55 13.19l7.98 6.19C12.43 13.74 17.74 9.52 24 9.52z"/>
    </svg>
    {% trans "Войти через Google" %}
  </a>
  {% endif %}
{% endfor %}
